  step:0,
  suppliers:[
    {id:1,name:"New York, NY",lat:40.713,lng:-74.006,demand:1000,isCustom:false},
    {id:2,name:"Chicago, IL",lat:41.878,lng:-87.630,demand:800,isCustom:false},
    {id:3,name:"Los Angeles, CA",lat:34.052,lng:-118.244,demand:1200,isCustom:false},
    {id:4,name:"Dallas, TX",lat:32.776,lng:-96.797,demand:600,isCustom:false},
    {id:5,name:"Miami, FL",lat:25.762,lng:-80.191,demand:500,isCustom:false},
  ],
  editingId:null,numWH:1,
  priorityId:'balanced',
  weights:{transport:35,labor:25,land:25,workforce:15},
  candidateMode:'major',results:null,scenarios:[],
  reductionHintDismissed:false,selectedWHIdx:0,
  activePanel:'calc', // 'calc' | 'breakeven' | null
  breakeven:{fixed:500000,freight:0.001},
};

function getActiveWeights(){
  const p=PRIORITY_PRESETS.find(x=>x.id===state.priorityId);
  if(p&&p.weights)return p.weights;
  return state.weights;
}

function render(){
  destroyCurrentMap();renderProgress();
  const sc=document.getElementById('stepContent');sc.innerHTML='';
  if(state.step===0)sc.appendChild(buildStep1());
  else if(state.step===1)sc.appendChild(buildStep2());
  else if(state.step===2)sc.appendChild(buildStep3());
}

function renderProgress(){
  const steps=[{l:'Your locations',s:'Add suppliers & customers'},{l:'Priorities',s:'What matters most?'},{l:'Results',s:'See recommendations'}];
  const pi=document.getElementById('progressInner');pi.innerHTML='';
  steps.forEach((step,i)=>{
    const btn=document.createElement('button');
    btn.className='prog-step'+(i===state.step?' active':(i<state.step?' done':''));
    btn.innerHTML=`<div class="prog-num">${i<state.step?'✓':(i+1)}</div><div style="text-align:left"><div class="prog-label">${step.l}</div><span class="prog-sub">${step.s}</span></div>`;
    if(i<=state.step)btn.onclick=()=>{state.step=i;render();};
    pi.appendChild(btn);
  });
  document.getElementById('progFill').style.width=`${(state.step/2)*100}%`;
}

// ─── Step 1 ───────────────────────────────────────────────────────────────────
function buildStep1(){
  const c=document.createElement('div');
  const hasSups=state.suppliers.length>0;
  if(!hasSups){
    const wb=document.createElement('div');wb.className='welcome-banner';
    wb.innerHTML=`<div class="welcome-icon">🏭</div><div><div class="welcome-title">Find the best warehouse location for your business</div><div class="welcome-text">Add your supplier or customer locations below. The tool evaluates every major US city and recommends where to place your warehouse — factoring in shipping costs, labor costs, land costs, and workforce availability.</div><div class="welcome-steps"><span class="welcome-step-chip current">① Add locations</span><span class="welcome-step-chip">② Set priorities</span><span class="welcome-step-chip">③ See results</span></div></div>`;
    c.appendChild(wb);
  }

  const mw=document.createElement('div');mw.className='map-wrap';
  mw.innerHTML=buildMapShell('map-step1',state.suppliers,null,{});
  c.appendChild(mw);
  setTimeout(()=>renderMap('map-step1',state.suppliers,null,[],{}),0);

  if(hasSups){
    const tw=document.createElement('div');tw.className='tbl-wrap';
    const tbl=document.createElement('table');
    tbl.innerHTML=`<thead><tr><th>Location</th><th>Annual demand</th><th>Type</th><th style="width:90px"></th></tr></thead>`;
    const tbody=document.createElement('tbody');
    state.suppliers.forEach(s=>{
      const tr=document.createElement('tr');
      if(state.editingId===s.id){
        tr.innerHTML=`<td><input id="edit_name" value="${s.name}" style="min-width:130px"/></td><td><input id="edit_dem" type="number" value="${s.demand}" style="width:90px"/></td><td>—</td><td class="action-cell"><button class="btn-sm btn-success" id="saveEdit">Save</button><button class="btn-sm btn-ghost" id="cancelEdit">×</button></td>`;
        tbody.appendChild(tr);
        setTimeout(()=>{
          tr.querySelector('#saveEdit').onclick=()=>{const nm=tr.querySelector('#edit_name').value.trim(),dem=+tr.querySelector('#edit_dem').value;if(!nm)return;const idx=state.suppliers.findIndex(x=>x.id===s.id);if(idx>=0)state.suppliers[idx]={...state.suppliers[idx],name:nm,demand:dem||500};state.editingId=null;render();};
          tr.querySelector('#cancelEdit').onclick=()=>{state.editingId=null;render();};
        },0);
      } else {
        const tb=s.isCustom?`<span class="type-badge-custom">Custom</span>`:`<span class="type-badge-db">Database</span>`;
        tr.innerHTML=`<td class="name-cell">${s.name}</td><td>${Number(s.demand).toLocaleString()} units/yr</td><td>${tb}</td><td class="action-cell"><button class="btn-sm btn-ghost" data-edit="${s.id}">Edit</button><button class="btn-sm btn-danger" data-del="${s.id}">Remove</button></td>`;
        tbody.appendChild(tr);
        tr.querySelector(`[data-edit="${s.id}"]`).onclick=()=>{state.editingId=s.id;render();};
        tr.querySelector(`[data-del="${s.id}"]`).onclick=()=>{const snap=[...state.suppliers],rem=state.suppliers.find(x=>x.id===s.id);state.suppliers=state.suppliers.filter(x=>x.id!==s.id);render();showToast(`Removed "${rem.name}"`,()=>{state.suppliers=snap;render();});};
      }
    });
    tbl.appendChild(tbody);tw.appendChild(tbl);c.appendChild(tw);
  }

  const addCard=document.createElement('div');addCard.className='card';
  addCard.innerHTML=`<div class="card-title">Add a location</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;">
      <div style="flex:2;min-width:200px;"><label class="field-label">Select a city</label><select id="citySelect"><option value="">Choose a city…</option>${[...CITIES_MAJOR].sort((a,b)=>a.name.localeCompare(b.name)).map(city=>`<option value="${city.name}|${city.state}">${city.name}, ${city.state}</option>`).join('')}</select></div>
      <div style="width:140px;"><label class="field-label">Annual demand (units)</label><input id="qaDemand" type="number" value="500" min="1"/></div>
      <button id="qaAdd" class="btn-primary">+ Add</button>
    </div>
    <div id="qaErr" class="field-error" style="display:none;margin-top:6px;"></div>
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
      <label class="field-label">Or search by address <span style="font-size:11px;font-weight:400;color:var(--text3);">(contiguous 48 states only)</span></label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start;">
        <div style="flex:3;min-width:200px;position:relative;"><input id="mAddr" placeholder="Type a US city or address…" autocomplete="off"/><div id="mSug" style="display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);z-index:200;overflow:hidden;max-height:200px;overflow-y:auto;"></div></div>
        <input id="mDem" type="number" placeholder="Demand" style="width:110px;"/>
        <button id="mAdd" class="btn-primary" disabled>+ Add</button>
      </div>
      <div id="mCoords" style="display:none;font-size:11.5px;color:var(--text3);margin-top:5px;font-family:var(--mono);"></div>
      <div id="mErr" class="field-error" style="display:none;margin-top:4px;"></div>
    </div>`;
  c.appendChild(addCard);

  addCard.querySelector('#qaAdd').onclick=()=>{
    const sel=addCard.querySelector('#citySelect'),err=addCard.querySelector('#qaErr');
    const[cn,cs]=(sel.value||'').split('|');const city=CITIES_MAJOR.find(x=>x.name===cn&&x.state===cs);
    if(!city){err.textContent='Please choose a city.';err.style.display='block';return;}
    err.style.display='none';
    state.suppliers.push({id:Date.now(),name:`${city.name}, ${city.state}`,lat:city.lat,lng:city.lng,demand:parseInt(addCard.querySelector('#qaDemand').value)||500,isCustom:false});
    sel.value='';render();showToast(`Added ${city.name}, ${city.state}`);
  };

  let sp=null,dt=null;
  const ai=addCard.querySelector('#mAddr'),sg=addCard.querySelector('#mSug'),co=addCard.querySelector('#mCoords'),ab=addCard.querySelector('#mAdd'),er=addCard.querySelector('#mErr');
  const clr=()=>{sp=null;ab.disabled=true;co.style.display='none';};
  const showE=(m)=>{er.textContent=m;er.style.display='block';clr();sg.style.display='none';};
  const isC48=(lat,lng,sc)=>{if(['AK','HI','PR','VI','GU','MP','AS'].includes(sc))return false;return lat>=24.5&&lat<=49.5&&lng>=-125&&lng<=-66.5;};
  const setSP=(place)=>{
    if(place.address?.country_code&&place.address.country_code!=='us'){showE('Please use a location in the contiguous 48 US states.');ai.value='';return;}
    const lat=parseFloat(place.lat),lng=parseFloat(place.lon),sc=place.address?.['ISO3166-2-lvl4']?.split('-')[1];
    if(!isC48(lat,lng,sc)){showE('Alaska, Hawaii, and territories are not supported.');ai.value='';return;}
    sp=place;ai.value=place.display_name.split(',').slice(0,3).join(',').trim();sg.style.display='none';ab.disabled=false;
    co.textContent=`${lat.toFixed(5)}, ${lng.toFixed(5)}`;co.style.display='block';er.style.display='none';
  };
  const fetchSug=async(q)=>{
    if(q.length<3){sg.style.display='none';return;}
    const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=6&countrycodes=us&addressdetails=1`,{headers:{'Accept-Language':'en'}}).catch(()=>null);
    if(!res)return;const data=await res.json().catch(()=>[]);
    const filt=data.filter(p=>{if(p.address?.country_code&&p.address.country_code!=='us')return false;return isC48(parseFloat(p.lat),parseFloat(p.lon),p.address?.['ISO3166-2-lvl4']?.split('-')[1]);});
    if(!filt.length){sg.innerHTML=`<div style="padding:10px 14px;font-size:12px;color:var(--text2);">No US locations found.</div>`;sg.style.display='block';return;}
    sg.innerHTML='';
    filt.forEach((place,i)=>{const parts=place.display_name.split(','),main=parts.slice(0,2).join(',').trim(),sub=parts.slice(2,4).join(',').trim();const item=document.createElement('div');item.style.cssText=`padding:8px 13px;cursor:pointer;border-top:${i>0?'1px solid var(--border)':'none'};display:flex;flex-direction:column;gap:1px;`;item.innerHTML=`<span style="font-size:13px;color:var(--text);font-weight:600;">${main}</span><span style="font-size:11.5px;color:var(--text2);">${sub}</span>`;item.onmousedown=e=>{e.preventDefault();setSP(place);};item.onmouseover=()=>item.style.background='var(--bg3)';item.onmouseout=()=>item.style.background='';sg.appendChild(item);});
    sg.style.display='block';
  };
  ai.oninput=()=>{clr();er.style.display='none';clearTimeout(dt);dt=setTimeout(()=>fetchSug(ai.value.trim()),350);};
  ai.onblur=()=>setTimeout(()=>{sg.style.display='none';},150);
  ai.onfocus=()=>{if(sg.children.length)sg.style.display='block';};
  ab.onclick=()=>{
    if(!sp){er.textContent='Please select from the dropdown.';er.style.display='block';return;}
    er.style.display='none';const name=sp.display_name.split(',').slice(0,3).join(',').trim();
    state.suppliers.push({id:Date.now(),name,lat:parseFloat(sp.lat),lng:parseFloat(sp.lon),demand:+addCard.querySelector('#mDem').value||500,isCustom:true});
    ai.value='';addCard.querySelector('#mDem').value='';co.style.display='none';sp=null;ab.disabled=true;render();showToast(`Added ${name}`);
  };

  if(hasSups){
    const td=state.suppliers.reduce((s,x)=>s+x.demand,0);
    let span='—';if(state.suppliers.length>1){let mx=0;for(let i=0;i<state.suppliers.length;i++)for(let j=i+1;j<state.suppliers.length;j++){const d=haversine(state.suppliers[i].lat,state.suppliers[i].lng,state.suppliers[j].lat,state.suppliers[j].lng);if(d>mx)mx=d;}span=Math.round(mx).toLocaleString()+' km';}
    const mg=document.createElement('div');mg.className='metric-grid';
    [{l:'Locations',v:state.suppliers.length,s:'sites added'},{l:'Total demand',v:td.toLocaleString(),s:'units / year'},{l:'Coverage span',v:span,s:'max distance between sites'}].forEach(m=>{mg.innerHTML+=`<div class="metric-card"><div class="metric-label">${m.l}</div><div class="metric-value">${m.v}</div><div class="metric-sub">${m.s}</div></div>`;});
    c.appendChild(mg);
  }

  const nav=document.createElement('div');nav.className='row';nav.style.marginTop='4px';
  const next=document.createElement('button');next.className='btn-primary';next.style.cssText='padding:10px 26px;font-size:13.5px;';next.textContent='Continue: Set priorities →';next.disabled=state.suppliers.length<1;next.onclick=()=>{state.step=1;render();};nav.appendChild(next);
  if(!hasSups){const h=document.createElement('span');h.style.cssText='font-size:12px;color:var(--text3);';h.textContent='Add at least one location to continue.';nav.appendChild(h);}
  c.appendChild(nav);
  return c;
}

// ─── Step 2 ───────────────────────────────────────────────────────────────────
function buildStep2(){
  const c=document.createElement('div');
  const wb=document.createElement('div');wb.className='welcome-banner';wb.style.marginBottom='22px';
  wb.innerHTML=`<div class="welcome-icon">🎯</div><div><div class="welcome-title">What matters most for your business?</div><div class="welcome-text">Pick a priority below. The model evaluates ${getCandidateCities().length} US cities and ranks them accordingly.</div><div class="welcome-steps"><span class="welcome-step-chip done">① Locations added</span><span class="welcome-step-chip current">② Set priorities</span><span class="welcome-step-chip">③ See results</span></div></div>`;
  c.appendChild(wb);

  const priCard=document.createElement('div');priCard.className='card';
  priCard.innerHTML=`<div class="card-title">Priority</div><div class="priority-grid" id="pg"></div>`;
  c.appendChild(priCard);
  PRIORITY_PRESETS.forEach(p=>{const btn=document.createElement('button');btn.className='priority-btn'+(state.priorityId===p.id?' active':'');btn.innerHTML=`<div class="priority-btn-icon">${p.icon}</div><div class="priority-btn-title">${p.label}</div><div class="priority-btn-sub">${p.desc}</div>`;btn.onclick=()=>{state.priorityId=p.id;if(p.weights)state.weights={...p.weights};render();};priCard.querySelector('#pg').appendChild(btn);});

  if(state.priorityId==='custom'){
    const wCard=document.createElement('div');wCard.className='card';
    const wTotal=Object.values(state.weights).reduce((a,b)=>a+b,0);
    wCard.innerHTML=`<div class="card-title">Custom weights</div>`;
    const tc=document.createElement('div');tc.className='weight-total-chip '+(wTotal===100?'weight-total-ok':'weight-total-bad');tc.innerHTML=`${wTotal===100?'✓':'⚠'} Total: ${wTotal}%`;wCard.appendChild(tc);
    if(wTotal!==100){const na=document.createElement('div');na.className='normalize-alert';na.innerHTML=`<span>Weights don't add up to 100%.</span><span class="spacer"></span><button id="nb">Auto-fix</button>`;wCard.appendChild(na);na.querySelector('#nb').onclick=()=>{const tot=Object.values(state.weights).reduce((a,b)=>a+b,0)||1,keys=Object.keys(state.weights);let rem=100;keys.forEach((k,i)=>{if(i<keys.length-1){const v=Math.round(state.weights[k]/tot*100);state.weights[k]=v;rem-=v;}else state.weights[k]=rem;});render();};}
    [{k:'transport',l:'Shipping cost',d:'Proximity to your customers — lower = shorter routes.'},{k:'labor',l:'Labor cost',d:'Regional wage index (1.0 = national average).'},{k:'land',l:'Facility cost',d:'Commercial real estate cost index (1.0 = national avg).'},{k:'workforce',l:'Workforce availability',d:'Access to a large labor pool near the facility.'}].forEach(f=>{const row=document.createElement('div');row.className='weight-row';row.innerHTML=`<div class="weight-top"><span class="weight-label">${f.l}</span><span class="weight-val" id="wv_${f.k}">${state.weights[f.k]}%</span></div><div class="weight-desc">${f.d}</div><input type="range" min="0" max="100" step="5" value="${state.weights[f.k]}" id="ws_${f.k}"/>`;wCard.appendChild(row);setTimeout(()=>{const sl=wCard.querySelector(`#ws_${f.k}`);if(sl)sl.oninput=e=>{state.weights[f.k]=+e.target.value;render();};},0);});
    c.appendChild(wCard);
  }

  const whCard=document.createElement('div');whCard.className='card';
  whCard.innerHTML=`<div class="card-title">Number of warehouses</div><div class="wh-count-row" id="whBtns"></div><div class="wh-count-hint">${state.numWH===1?'One central warehouse — simplest to operate, lowest fixed cost.':'Multiple warehouses — the model clusters your locations and finds the best city for each group.'}</div>`;
  c.appendChild(whCard);
  [1,2,3,4,5].forEach(n=>{const b=document.createElement('button');b.className='wh-count-btn'+(state.numWH===n?' active':'');b.textContent=n;b.onclick=()=>{state.numWH=n;render();};whCard.querySelector('#whBtns').appendChild(b);});

  const poolCard=document.createElement('div');poolCard.className='card';
  poolCard.innerHTML=`<div class="card-title">Candidate city pool</div><div class="pool-toggle"><button class="pool-btn${state.candidateMode==='major'?' active':''}" id="poolMaj"><div class="pool-btn-title">⭐ Major metros <span style="font-size:11px;font-weight:400;">(${CITIES_MAJOR.length} cities)</span></div><div class="pool-btn-sub">Largest US markets with established logistics networks.</div></button><button class="pool-btn${state.candidateMode==='all'?' active':''}" id="poolAll"><div class="pool-btn-title">🗺 All US cities <span style="font-size:11px;font-weight:400;">(${CITIES_MAJOR.length+CITIES_EXTRA.length} cities)</span></div><div class="pool-btn-sub">Includes smaller markets — may surface lower-cost options.</div></button></div>`;
  c.appendChild(poolCard);
  poolCard.querySelector('#poolMaj').onclick=()=>{state.candidateMode='major';render();};
  poolCard.querySelector('#poolAll').onclick=()=>{state.candidateMode='all';render();};

  const nav=document.createElement('div');nav.className='row';nav.style.marginTop='4px';
  const back=document.createElement('button');back.textContent='← Back';back.onclick=()=>{state.step=0;render();};
  const run=document.createElement('button');run.className='btn-primary';run.style.cssText='padding:10px 26px;font-size:13.5px;';run.textContent='Run optimization →';run.onclick=runOptimization;
  nav.appendChild(back);nav.appendChild(run);c.appendChild(nav);
  return c;
}

function runOptimization(){
  const cities=getCandidateCities(),w=getActiveWeights();
  const allScored=scoreAll(state.suppliers,cities,w);
  const whs=multiWH(state.suppliers,cities,state.numWH,w);
  const td=state.suppliers.reduce((s,x)=>s+x.demand,0)||1;
  const cogLat=state.suppliers.reduce((s,x)=>s+x.lat*x.demand,0)/td;
  const cogLng=state.suppliers.reduce((s,x)=>s+x.lng*x.demand,0)/td;
  const cogNearest=[...cities].sort((a,b)=>haversine(a.lat,a.lng,cogLat,cogLng)-haversine(b.lat,b.lng,cogLat,cogLng))[0];
  const result={allScored,top10:allScored.slice(0,10),warehouses:whs,cogNearest,cogLat,cogLng,numWH:state.numWH,requestedWH:state.numWH,actualWH:whs.length,weights:{...w},priorityId:state.priorityId,candidateMode:state.candidateMode,cityCount:cities.length};
  state.results=result;state.reductionHintDismissed=false;state.selectedWHIdx=0;state.activePanel='calc';
  const exists=state.scenarios.findIndex(s=>JSON.stringify(s.weights)===JSON.stringify(result.weights)&&s.numWH===result.numWH&&s.candidateMode===result.candidateMode);
  if(exists>=0)state.scenarios[exists]=result;else{state.scenarios.push(result);if(state.scenarios.length>3)state.scenarios.shift();}
  state.step=2;render();
}

// ─── Step 3 ───────────────────────────────────────────────────────────────────
function buildStep3(){
  if(!state.results)return document.createElement('div');
  const r=state.results,top=r.top10[0];
  const cities=getCandidateCities();
  const c=document.createElement('div');

  const expRow=document.createElement('div');expRow.className='export-row no-print';
  expRow.innerHTML=`<button class="btn-primary" id="expCSV">↓ Download results (CSV)</button><button id="expPrint" style="padding:9px 18px;font-size:13px;">⎙ Print</button><button id="expBack" class="btn-ghost" style="padding:9px 16px;font-size:13px;">← Adjust settings</button>`;
  c.appendChild(expRow);
  expRow.querySelector('#expCSV').onclick=exportCSV;
  expRow.querySelector('#expPrint').onclick=()=>window.print();
  expRow.querySelector('#expBack').onclick=()=>{state.step=1;render();};

  if(r.actualWH<r.requestedWH&&!state.reductionHintDismissed){
    const hint=document.createElement('div');hint.className='subtle-hint no-print';
    hint.innerHTML=`<div class="subtle-hint-text">Your suppliers naturally group into <strong>${r.actualWH} cluster${r.actualWH!==1?'s':''}</strong> — ${r.actualWH} warehouse${r.actualWH!==1?'s':''} may serve them better than ${r.requestedWH}.</div><button class="subtle-hint-action" id="applyRed">Try ${r.actualWH} WH</button><button class="subtle-hint-dismiss" id="dismissHint">×</button>`;
    c.appendChild(hint);
    hint.querySelector('#applyRed').onclick=()=>{state.numWH=r.actualWH;state.step=1;render();};
    hint.querySelector('#dismissHint').onclick=()=>{state.reductionHintDismissed=true;render();};
  }

  if(state.scenarios.length>1){
    const sc2=document.createElement('div');sc2.className='scenario-bar no-print';
    sc2.innerHTML=`<div style="font-size:12.5px;font-weight:600;color:var(--text);">📊 Saved scenarios — click to compare</div><div class="scenario-list" id="scenList"></div>`;
    c.appendChild(sc2);
    state.scenarios.forEach((sc,i)=>{const chip=document.createElement('div');const isCurr=JSON.stringify(sc.weights)===JSON.stringify(r.weights)&&sc.numWH===r.numWH&&sc.candidateMode===r.candidateMode;chip.className='scenario-chip'+(isCurr?' active-chip':'');chip.innerHTML=`<span>S${i+1}: <strong>${sc.warehouses.map(w=>w.city.name).join(' + ')}</strong></span><span style="font-size:11px;color:var(--text2)">${sc.actualWH||sc.numWH} WH</span>`;chip.onclick=()=>{state.results=sc;state.step=2;render();};sc2.querySelector('#scenList').appendChild(chip);});
  }

  // Multi-WH cards
  if(r.warehouses.length>1){
    const mwH=document.createElement('p');mwH.className='section-heading';mwH.textContent='Your warehouse network';c.appendChild(mwH);
    const whFlex=document.createElement('div');whFlex.className='wh-network';
    r.warehouses.forEach((wh,i)=>{
      const card=document.createElement('div');card.className='wh-net-card';
      const isSel=i===state.selectedWHIdx;
      card.style.cssText=`border-top:3px solid ${WH_COLORS[i]};opacity:${isSel?'1':'0.6'};${isSel?`box-shadow:0 0 0 2px ${WH_COLORS[i]},var(--shadow-md);`:''}`;
      // Get absolute score for this warehouse
      const wscore=scoreWarehouseAbsolute(wh,cities,r.weights);
      const wsl=scoreLabel(wscore.suitability);
      card.innerHTML=`<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:flex;align-items:center;gap:5px;">WH ${i+1}${isSel?`<span style="font-size:9px;padding:1px 6px;border-radius:20px;background:${WH_COLORS[i]}18;color:${WH_COLORS[i]};border:1px solid ${WH_COLORS[i]}44;font-weight:700;">Viewing</span>`:''}</div><div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px;">${wh.city.name}, ${wh.city.state}</div><div style="margin-bottom:4px;"><span class="score-badge ${wsl.cls}" style="font-size:10px;">${wscore.suitability}/100 — ${wsl.text}</span></div><div style="font-size:12px;color:var(--text2);">Serves ${wh.suppliers.length} location${wh.suppliers.length!==1?'s':''}</div><div style="font-size:11.5px;color:var(--text3);margin-top:3px;line-height:1.5;">${wh.suppliers.map(s=>s.name).join(', ')}</div>`;
      card.onmouseenter=()=>{if(i!==state.selectedWHIdx)card.style.opacity='0.8';};
      card.onmouseleave=()=>{if(i!==state.selectedWHIdx)card.style.opacity='0.6';};
      card.onclick=()=>{state.selectedWHIdx=i;render();};
      whFlex.appendChild(card);
    });
    c.appendChild(whFlex);
  }

  // Map
  const mapWrap=document.createElement('div');mapWrap.className='map-wrap';
  mapWrap.innerHTML=buildMapShell('map-step3',state.suppliers,r.warehouses,{});
  c.appendChild(mapWrap);
  setTimeout(()=>renderMap('map-step3',state.suppliers,r.warehouses,getCandidateCities(),{showCandidates:true}),0);
  const dc=isDarkMode()?'#8899b0':'#9ca3af';
  const mn=document.createElement('p');mn.style.cssText='font-size:11.5px;color:var(--text3);margin:-6px 2px 16px;line-height:1.6;';
  mn.innerHTML=`<span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${dc};opacity:.6;vertical-align:middle;margin-right:5px;"></span>Hover any grey dot to see that city's cost indices. ${r.cityCount} candidate cities evaluated.`;
  c.appendChild(mn);

  // ── Recommendation card ─────────────────────────────────────────────────────
  const selIdx=r.warehouses.length>1?state.selectedWHIdx:0;
  const selWH=r.warehouses.length>0?r.warehouses[selIdx]:null;
  const topLabel=r.warehouses.length>1?`Warehouse ${selIdx+1} of ${r.warehouses.length}`:'★ Top recommendation';
  const recColor=r.warehouses.length>1?WH_COLORS[selIdx]:'var(--blue)';

  // KEY FIX: Score the warehouse against ALL candidates using its own suppliers.
  // This gives a real absolute score, not a relative-to-other-WH score.
  let scored;
  if(r.warehouses.length>1&&selWH){
    scored=scoreWarehouseAbsolute(selWH,cities,r.weights);
  } else {
    scored=top;
  }
  const topCity=scored;
  const topSuit=scored.suitability;
  const topLO=scoreLabel(topSuit);
  const transit=selWH?calcTransitReach(selWH):null;
  const totalDemand=state.suppliers.reduce((s,x)=>s+x.demand,0);

  const recCard=document.createElement('div');recCard.className='rec-card';
  recCard.style.borderColor=recColor;recCard.style.boxShadow=`0 0 0 4px ${recColor}10,var(--shadow-md)`;

  recCard.innerHTML=`<div class="rec-eyebrow" style="color:${recColor};">${topLabel}</div>
    <div class="rec-city">${topCity.name}, ${topCity.state}</div>
    <div class="rec-badges">
      <span class="score-badge ${topLO.cls}" style="font-size:13px;padding:5px 14px;">${topSuit}/100 — ${topLO.text}</span>
      <span style="font-size:12px;color:var(--text3);">vs ${r.cityCount} candidate cities</span>
    </div>
    <div class="rec-metrics">
      ${[{l:'Avg shipping dist.',v:`${scored.transportKm.toLocaleString()} km`},{l:'Labor index',v:`${topCity.labor.toFixed(2)}×`},{l:'Land index',v:`${topCity.land.toFixed(2)}×`},{l:'Metro pop.',v:`${topCity.pop.toFixed(1)}M`}].map(m=>`<div class="rec-metric"><div class="rec-metric-val">${m.v}</div><div class="rec-metric-lbl">${m.l}</div></div>`).join('')}
    </div>
    <div class="factor-grid">
      ${[{k:'transport',l:'Shipping cost',n:scored.nT,w:r.weights.transport,ctx:`${scored.transportKm.toLocaleString()} km demand-weighted avg`},{k:'labor',l:'Labor cost',n:scored.nLb,w:r.weights.labor,ctx:`${topCity.labor.toFixed(2)}× regional wage index`},{k:'land',l:'Facility cost',n:scored.nLn,w:r.weights.land,ctx:`${topCity.land.toFixed(2)}× real estate index`},{k:'workforce',l:'Workforce',n:scored.nWf,w:r.weights.workforce,ctx:`${topCity.pop.toFixed(1)}M metro population`}].map(f=>{const s=Math.round((1-f.n)*100);return`<div class="factor-item"><div class="factor-name">${f.l} <span style="font-weight:400;">(${f.w}%)</span></div><div class="factor-score" style="color:${scoreBarColor(s)};">${s}</div><div class="factor-bar-track"><div class="factor-bar-fill" style="width:${s}%;background:${scoreBarColor(s)};"></div></div><div class="factor-context">${f.ctx}</div></div>`;}).join('')}
    </div>
    ${transit?`<div class="transit-row">
      <div class="transit-cell"><div class="transit-num">${transit.d1}</div><div class="transit-lbl">1-Day reach</div><div class="transit-sub">of ${transit.total} suppliers</div></div>
      <div class="transit-cell"><div class="transit-num">${transit.d2}</div><div class="transit-lbl">2-Day reach</div><div class="transit-sub">≤1,600 km</div></div>
      <div class="transit-cell"><div class="transit-num">${transit.d3}</div><div class="transit-lbl">3-Day reach</div><div class="transit-sub">≤2,400 km</div></div>
    </div>`:''}`;
  c.appendChild(recCard);

  // CoG box (single WH only)
  if(r.warehouses.length<=1){
    const cogBox=document.createElement('div');cogBox.className='cog-box';
    let ct=`<strong>Center of Gravity check:</strong> A simple distance-only model points to <strong>${r.cogNearest.name}, ${r.cogNearest.state}</strong>.`;
    if(r.cogNearest.name!==topCity.name)ct+=` This model recommends <strong>${topCity.name}</strong> instead — it also weighs labor (${topCity.labor.toFixed(2)}× vs ${r.cogNearest.labor.toFixed(2)}×) and facility costs that CoG ignores.`;
    else ct+=` Both agree — strong convergence signal.`;
    cogBox.innerHTML=ct;c.appendChild(cogBox);
  }

  // ── Panel tabs ──────────────────────────────────────────────────────────────
  const tabsWrap=document.createElement('div');tabsWrap.className='panel-tabs no-print';
  const tabs=[
    {id:'calc',icon:'🔢',label:'How we calculated this'},
    {id:'breakeven',icon:'💰',label:'Break-even calculator'},
  ];
  tabs.forEach(tab=>{
    const btn=document.createElement('button');btn.className='panel-tab'+(state.activePanel===tab.id?' active':'');
    btn.innerHTML=`<span class="panel-tab-icon">${tab.icon}</span>${tab.label}`;
    btn.onclick=()=>{state.activePanel=state.activePanel===tab.id?null:tab.id;renderPanels(panelBody,scored,r,selWH,totalDemand);tabsWrap.querySelectorAll('.panel-tab').forEach(t=>t.classList.remove('active'));if(state.activePanel)btn.classList.add('active');};
    tabsWrap.appendChild(btn);
  });
  c.appendChild(tabsWrap);

  const panelBody=document.createElement('div');panelBody.className='panel-body no-print';
  if(!state.activePanel)panelBody.classList.add('hidden');
  c.appendChild(panelBody);
  renderPanels(panelBody,scored,r,selWH,totalDemand);

  // ── Top-10 table ────────────────────────────────────────────────────────────
  const tH=document.createElement('p');tH.className='section-heading';
  tH.innerHTML=r.warehouses.length>1?`All candidates ranked <span style="font-size:11.5px;color:var(--text3);font-weight:400;margin-left:6px;">(single-warehouse view)</span>`:'All candidates ranked (top 10 of '+r.cityCount+')';
  c.appendChild(tH);
  const tWrap=document.createElement('div');tWrap.className='tbl-wrap';
  const tbl=document.createElement('table');
  tbl.innerHTML=`<thead><tr><th>#</th><th>City</th><th>State</th><th>Avg shipping dist.</th><th>Labor</th><th>Land</th><th>Pop (M)</th><th>Score</th></tr></thead>`;
  const tbody=document.createElement('tbody');
  r.top10.forEach((row,i)=>{
    const isTop=i===0,tr=document.createElement('tr');
    if(isTop)tr.className='top-row';
    const sl=scoreLabel(row.suitability);
    tr.innerHTML=`<td style="font-weight:700;">${i+1}</td><td class="name-cell">${row.name}</td><td>${row.state}</td><td class="mono">${row.transportKm.toLocaleString()} km</td><td class="mono">${row.labor.toFixed(2)}×</td><td class="mono">${row.land.toFixed(2)}×</td><td class="mono">${row.pop.toFixed(1)}</td><td><div style="display:flex;align-items:center;gap:7px;"><div class="score-bar-track" style="min-width:40px;"><div class="score-bar-fill" style="width:${row.suitability}%;background:${isTop?'var(--blue)':scoreBarColor(row.suitability)};"></div></div><span style="font-size:12px;font-weight:700;min-width:22px;font-family:var(--mono);">${row.suitability}</span><span class="score-badge ${sl.cls}" style="font-size:10.5px;">${sl.text}</span></div></td>`;
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);tWrap.appendChild(tbl);c.appendChild(tWrap);
  const n2=document.createElement('p');n2.style.cssText='font-size:11.5px;color:var(--text3);margin-bottom:16px;';n2.textContent=`Top 10 shown. Download CSV for all ${r.cityCount} cities with full score breakdown.`;c.appendChild(n2);

  const meth=document.createElement('div');meth.className='info-strip info-blue';
  meth.innerHTML=`<div class="info-strip-icon">ℹ</div><div><strong>Scoring is absolute:</strong> Each city's score (0–100) reflects how it ranks against all ${r.cityCount} candidates evaluated for your specific supplier locations — not relative to other selected warehouses. A score of 75 means this city outperforms 75% of all alternatives for your network.</div>`;
  c.appendChild(meth);
  return c;
}

// ─── Panel renderer ───────────────────────────────────────────────────────────
function renderPanels(container, scored, r, selWH, totalDemand){
  container.innerHTML='';
  if(!state.activePanel){container.classList.add('hidden');return;}
  container.classList.remove('hidden');
  if(state.activePanel==='calc') buildCalcPanel(container, scored, r, selWH);
  else if(state.activePanel==='breakeven') buildBreakevenPanel(container, r, totalDemand);
}

function buildCalcPanel(container, scored, r, selWH){
  const w=r.weights;
  const cities=getCandidateCities();
  // Re-run scoreAll to get the normalization context
  const sups=selWH?selWH.suppliers:state.suppliers;
  const allScored=scoreAll(sups,cities,w);
  const cityRank=allScored.findIndex(c=>c.name===scored.name&&c.state===scored.state)+1;
  const totalCities=allScored.length;
  const W=Object.values(w).reduce((a,b)=>a+b,0)||1;

  container.innerHTML=`<div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:18px;">How ${scored.name}, ${scored.state} got a score of ${scored.suitability}/100</div>`;

  // Step 1: Raw data
  const s1=document.createElement('div');s1.className='calc-step';
  s1.innerHTML=`<div class="calc-step-title"><div class="calc-step-num">1</div>Collect raw data for ${scored.name}</div>
    <p style="font-size:12.5px;color:var(--text2);margin-bottom:10px;line-height:1.65;">We start with the actual measured values for each cost factor.</p>
    <table class="calc-table">
      <thead><tr><th>Factor</th><th>Raw value</th><th>What it means</th><th>Weight</th></tr></thead>
      <tbody>
        <tr><td class="label">Shipping cost</td><td>${scored.transportKm.toLocaleString()} km</td><td>Demand-weighted avg road dist to all your suppliers</td><td>${w.transport}%</td></tr>
        <tr><td class="label">Labor cost</td><td>${scored.labor.toFixed(3)}×</td><td>Regional wage index (1.0 = US national average)</td><td>${w.labor}%</td></tr>
        <tr><td class="label">Facility cost</td><td>${scored.land.toFixed(3)}×</td><td>Warehouse lease cost index (1.0 = US national average)</td><td>${w.land}%</td></tr>
        <tr><td class="label">Workforce</td><td>${scored.pop.toFixed(2)}M pop</td><td>Metro area population proxy for labor pool size</td><td>${w.workforce}%</td></tr>
      </tbody>
    </table>`;
  container.appendChild(s1);

  // Step 2: Normalize
  const s2=document.createElement('div');s2.className='calc-step';
  // Find best and worst in each dimension
  const bestT=Math.min(...allScored.map(c=>c.rawT||c.transportKm)),worstT=Math.max(...allScored.map(c=>c.rawT||c.transportKm));
  const bestLb=Math.min(...allScored.map(c=>c.labor)),worstLb=Math.max(...allScored.map(c=>c.labor));
  const bestLn=Math.min(...allScored.map(c=>c.land)),worstLn=Math.max(...allScored.map(c=>c.land));
  const bestWf=Math.max(...allScored.map(c=>c.pop)),worstWf=Math.min(...allScored.map(c=>c.pop));
  s2.innerHTML=`<div class="calc-step-title"><div class="calc-step-num">2</div>Normalize each factor (0 = best, 1 = worst)</div>
    <p style="font-size:12.5px;color:var(--text2);margin-bottom:10px;line-height:1.65;">Raw values can't be compared directly (km vs dollars vs people). We scale each factor to a 0–1 range across all ${totalCities} candidate cities, so they're all on the same playing field.</p>
    <div class="calc-formula">normalized = (value − best) / (worst − best)</div>
    <table class="calc-table">
      <thead><tr><th>Factor</th><th>Best city in pool</th><th>${scored.name}</th><th>Worst city in pool</th><th>Normalized (${scored.name})</th></tr></thead>
      <tbody>
        <tr><td class="label">Shipping</td><td>${Math.round(bestT).toLocaleString()} km</td><td>${scored.transportKm.toLocaleString()} km</td><td>${Math.round(worstT).toLocaleString()} km</td><td class="mono"><span class="hi">${scored.nT.toFixed(3)}</span></td></tr>
        <tr><td class="label">Labor</td><td>${bestLb.toFixed(3)}×</td><td>${scored.labor.toFixed(3)}×</td><td>${worstLb.toFixed(3)}×</td><td class="mono"><span class="hi">${scored.nLb.toFixed(3)}</span></td></tr>
        <tr><td class="label">Facility</td><td>${bestLn.toFixed(3)}×</td><td>${scored.land.toFixed(3)}×</td><td>${worstLn.toFixed(3)}×</td><td class="mono"><span class="hi">${scored.nLn.toFixed(3)}</span></td></tr>
        <tr><td class="label">Workforce</td><td>${bestWf.toFixed(2)}M</td><td>${scored.pop.toFixed(2)}M</td><td>${worstWf.toFixed(2)}M</td><td class="mono"><span class="hi">${scored.nWf.toFixed(3)}</span></td></tr>
      </tbody>
    </table>
    <p class="calc-note">Lower normalized value = better (closer to the best city in the pool).</p>`;
  container.appendChild(s2);

  // Step 3: Weighted composite
  const s3=document.createElement('div');s3.className='calc-step';
  const tComp=((w.transport*scored.nT)+(w.labor*scored.nLb)+(w.land*scored.nLn)+(w.workforce*scored.nWf))/W;
  const contribT=((w.transport/W)*scored.nT).toFixed(4);
  const contribLb=((w.labor/W)*scored.nLb).toFixed(4);
  const contribLn=((w.land/W)*scored.nLn).toFixed(4);
  const contribWf=((w.workforce/W)*scored.nWf).toFixed(4);
  s3.innerHTML=`<div class="calc-step-title"><div class="calc-step-num">3</div>Weighted composite score</div>
    <p style="font-size:12.5px;color:var(--text2);margin-bottom:10px;line-height:1.65;">Multiply each normalized factor by its weight (as a fraction of 100%), then add them up.</p>
    <div class="calc-formula">composite = (T×${w.transport} + Lb×${w.labor} + Ln×${w.land} + Wf×${w.workforce}) / ${W}
= (${scored.nT.toFixed(3)}×${w.transport} + ${scored.nLb.toFixed(3)}×${w.labor} + ${scored.nLn.toFixed(3)}×${w.land} + ${scored.nWf.toFixed(3)}×${w.workforce}) / ${W}
= (<span class="hi">${contribT}</span> + <span class="hi">${contribLb}</span> + <span class="hi">${contribLn}</span> + <span class="hi">${contribWf}</span>)
= <span class="hi2">${tComp.toFixed(4)}</span></div>
    <p class="calc-note">Lower composite = better. 0.0 would be the perfect city; 1.0 would be the worst possible.</p>`;
  container.appendChild(s3);

  // Step 4: Convert to 0-100
  const s4=document.createElement('div');s4.className='calc-step';
  s4.innerHTML=`<div class="calc-step-title"><div class="calc-step-num">4</div>Convert to 0–100 score</div>
    <p style="font-size:12.5px;color:var(--text2);margin-bottom:12px;line-height:1.65;">Flip and scale so that 100 = best possible, 0 = worst possible.</p>
    <div class="calc-formula">score = round( (1 − composite) × 100 )
= round( (1 − ${tComp.toFixed(4)}) × 100 )
= <span class="hi2">${scored.suitability}</span></div>
    <div class="final-score-box">
      <div class="final-score-big">${scored.suitability}</div>
      <div class="final-score-detail">
        <strong>${scored.name}, ${scored.state}</strong> ranks <strong>#${cityRank} of ${totalCities}</strong> candidate cities for your specific supplier locations.<br/>
        This score is <em>absolute</em> — it reflects a genuine comparison against all alternatives, not just the other selected warehouses.
        ${scored.suitability>=80?'This is an excellent pick — very few cities beat it for your network.':scored.suitability>=65?'This is a good pick — it outperforms the majority of alternatives.':scored.suitability>=50?'This is a fair pick. There are better options worth reviewing.':'There are significantly better options in the top-10 table.'}
      </div>
    </div>`;
  container.appendChild(s4);
}

function buildBreakevenPanel(container, r, totalDemand){
  container.innerHTML=`<div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px;">Break-even calculator</div>
    <p style="font-size:12.5px;color:var(--text2);margin-bottom:18px;line-height:1.65;">Is your ${r.actualWH}-warehouse network worth the extra fixed cost vs one central warehouse? Adjust the inputs below to match your real cost structure.</p>
    <div class="be-inputs" id="beInputs">
      <div class="be-field"><label>Fixed cost per warehouse per year ($)<br/><span style="font-size:11px;font-weight:400;color:var(--text3);">Rent, staff, utilities, insurance</span></label><input type="number" id="be_fixed" value="${state.breakeven.fixed}" min="0" step="50000" style="font-family:var(--mono);margin-top:5px;"/></div>
      <div class="be-field"><label>Variable freight cost per unit per km ($)<br/><span style="font-size:11px;font-weight:400;color:var(--text3);">Avg cost per shipment unit-kilometer</span></label><input type="number" id="be_freight" value="${state.breakeven.freight}" min="0" step="0.0005" style="font-family:var(--mono);margin-top:5px;"/></div>
    </div>
    <div id="beResult"></div>`;

  const doCalc=()=>{
    const fixed=+container.querySelector('#be_fixed').value||0;
    const freight=+container.querySelector('#be_freight').value||0;
    state.breakeven={fixed,freight};

    const avgDist1=r.top10[0].transportKm;
    const avgDistN=r.actualWH>1?networkAvgDist(r.warehouses):avgDist1;
    const cost1=fixed*1+freight*totalDemand*avgDist1;
    const costN=fixed*r.actualWH+freight*totalDemand*avgDistN;
    const savings=cost1-costN;
    const savingsPct=cost1>0?Math.round(savings/cost1*100):0;
    const fmt=n=>n>=1e6?`$${(n/1e6).toFixed(2)}M`:(n>=1e3?`$${(n/1000).toFixed(0)}K`:`$${Math.round(n).toLocaleString()}`);
    const betterN=costN<=cost1;
    const vc=betterN?'var(--green)':'var(--red)';

    let beqDemand=null;
    if(r.actualWH>1&&avgDist1>avgDistN&&freight>0){
      beqDemand=Math.round(fixed*(r.actualWH-1)/(freight*(avgDist1-avgDistN)));
    }

    const res=container.querySelector('#beResult');
    res.innerHTML='';

    // Cost cards
    const cRow=document.createElement('div');cRow.className='be-result-grid';
    const cards=[
      {label:`1 warehouse`,val:fmt(cost1),sub:`${Math.round(avgDist1).toLocaleString()} km avg`,color:'var(--blue)'},
      ...(r.actualWH>1?[{label:`${r.actualWH} warehouses`,val:fmt(costN),sub:`${Math.round(avgDistN).toLocaleString()} km avg`,color:WH_COLORS[0]}]:[]),
      ...(r.actualWH>1?[{label:betterN?'Annual savings':'Extra cost',val:`${betterN?'-':'+'} ${fmt(Math.abs(savings))}`,sub:`${Math.abs(savingsPct)}% ${betterN?'cheaper':'more expensive'}`,color:betterN?'var(--green)':'var(--red)'}]:[]),
    ];
    cards.forEach(card=>{
      cRow.innerHTML+=`<div class="be-cost-card" style="border-top:3px solid ${card.color};"><div class="be-cost-val" style="color:${card.color};">${card.val}/yr</div><div class="be-cost-lbl">${card.label}<br/><span style="font-weight:400;">${card.sub}</span></div></div>`;
    });
    res.appendChild(cRow);

    const verdict=document.createElement('div');verdict.className='be-verdict';
    if(r.actualWH>1){
      const distDiff=Math.round(Math.abs(avgDist1-avgDistN));
      verdict.innerHTML=`<strong>${betterN?'✅ Your '+r.actualWH+'-warehouse network saves money':'⚠️ A single warehouse is cheaper at current demand volumes'}</strong> — the multi-WH network costs <strong style="color:${vc};">${fmt(Math.abs(savings))} per year (${Math.abs(savingsPct)}%) ${betterN?'less':'more'}</strong> than a single warehouse. The ${distDiff.toLocaleString()} km reduction in average shipping distance ${betterN?'outweighs':'does not yet offset'} the extra fixed cost of ${fmt(fixed*(r.actualWH-1))} per year.`;
      if(beqDemand!==null){
        verdict.innerHTML+=`<br/><br/><strong>Break-even demand:</strong> You need <strong>${beqDemand.toLocaleString()} units/year</strong> for the ${r.actualWH}-WH network to pay off. Your current volume is <strong>${totalDemand.toLocaleString()} units</strong> — <span style="color:${totalDemand>=beqDemand?'var(--green)':'var(--amber)'};font-weight:600;">${totalDemand>=beqDemand?'you are above break-even ✓':'you are below break-even ⚠️'}</span>.`;
      }
    } else {
      verdict.innerHTML=`<strong>Add a second warehouse</strong> in Step 2 to see the full break-even comparison. At your current demand of ${totalDemand.toLocaleString()} units/year, you can estimate whether the freight savings would justify the extra fixed cost.`;
    }
    res.appendChild(verdict);

    // Break-even bar
    if(beqDemand!==null){
      const maxVal=Math.max(totalDemand,beqDemand)*1.15;
      const fillPct=Math.min(98,Math.round(totalDemand/maxVal*100));
      const markerPct=Math.min(97,Math.round(beqDemand/maxVal*100));
      const barEl=document.createElement('div');barEl.className='be-bar-wrap';
      barEl.innerHTML=`<div class="be-bar-label"><span>0 units</span><span style="color:var(--amber);">Break-even: ${(beqDemand/1000).toFixed(0)}K units/yr</span><span>Current: ${(totalDemand/1000).toFixed(0)}K units/yr</span></div>
        <div class="be-bar-track">
          <div class="be-bar-fill" style="width:${fillPct}%;background:${totalDemand>=beqDemand?'var(--green)':'var(--amber)'};"></div>
          <div class="be-bar-marker" style="left:${markerPct}%;"></div>
        </div>`;
      res.appendChild(barEl);
    }

    // How it's calculated
    const howEl=document.createElement('div');howEl.style.cssText='margin-top:14px;padding-top:14px;border-top:1px solid var(--border);font-size:12px;color:var(--text3);line-height:1.75;';
    howEl.innerHTML=`<strong style="color:var(--text2);">How these numbers are calculated:</strong><br/>
      1-WH annual cost = fixed cost (${fmt(fixed)}) + freight (${freight.toFixed(4)} $/unit/km × ${totalDemand.toLocaleString()} units × ${Math.round(avgDist1).toLocaleString()} km avg) = <strong style="font-family:var(--mono);">${fmt(cost1)}</strong><br/>
      ${r.actualWH>1?`${r.actualWH}-WH annual cost = ${r.actualWH}× fixed (${fmt(fixed*r.actualWH)}) + freight (${freight.toFixed(4)} × ${totalDemand.toLocaleString()} × ${Math.round(avgDistN).toLocaleString()} km avg) = <strong style="font-family:var(--mono);">${fmt(costN)}</strong>`:''}`;
    res.appendChild(howEl);
  };

  setTimeout(()=>{
    doCalc();
    container.querySelector('#be_fixed').oninput=doCalc;
    container.querySelector('#be_freight').oninput=doCalc;
  },0);
}

function exportCSV(){
  if(!state.results)return;
  const rows=[['Rank','City','State','Avg Road Dist (km)','Labor Index','Land Index','Population (M)','Score','Transport Component','Labor Component','Land Component','Workforce Component'],
    ...state.results.allScored.map((r,i)=>[i+1,r.name,r.state,r.transportKm,r.labor.toFixed(2),r.land.toFixed(2),r.pop.toFixed(1),r.suitability,Math.round((1-r.nT)*100),Math.round((1-r.nLb)*100),Math.round((1-r.nLn)*100),Math.round((1-r.nWf)*100)])];
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='warehouse_results.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);
}

render();
</script>
